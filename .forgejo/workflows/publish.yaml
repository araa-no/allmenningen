name: Publish
on:
  push:
    branches:
      - main
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v3
        id: cache
        with:
          path: |
            ~/.cache/go-build
            ~/go
          key: ${{ runner.os }}-go-
      - uses: actions/setup-go@v4
        with:
          go-version: '>=1.21.0'
      - name: Install Hugo
        run: |
          go install -tags extended github.com/gohugoio/hugo@latest
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Build
        run: |
          hugo --minify
      - uses: actions/git-pages@v2
        with:
          site: https://araa.codeberg.page/araa.no/
          token: ${{ forge.token }}
          source: public/
