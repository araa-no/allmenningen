<div class="my-8 bg-ink-600 rounded-lg overflow-hidden -mx-4 sm:-mx-6 lg:-mx-8">
  <div class="flex items-center justify-between px-4 sm:px-6 py-2.5 border-b border-cream-500/10">
    <span class="text-xs text-cream-400 font-mono">example.js</span>
    <button class="text-xs text-cream-500 hover:text-cream-300 transition-colors" onclick="navigator.clipboard.writeText(this.closest('.my-8').querySelector('code').textContent); this.textContent='Copied'; setTimeout(()=>this.textContent='Copy',1500)">Copy</button>
  </div>
  <pre class="px-4 sm:px-6 py-4 overflow-x-auto"><code class="text-sm font-mono leading-relaxed">{{ $result := transform.HighlightCodeBlock . }}{{ $result.Wrapped }}</code></pre>
</div>
